config_version: 3

log_level: info

token_usage:
  enabled: false

# ── Models ─────────────────────────────────────────────────────────
models:
  - name: claude-sonnet
    display_name: Claude Sonnet 4.6
    use: langchain_anthropic:ChatAnthropic
    model: claude-sonnet-4-6
    api_key: $ANTHROPIC_API_KEY
    max_tokens: 8192
    temperature: 0.0
    supports_vision: true

basic_model: claude-sonnet
reasoning_model: claude-sonnet

# ── Tools ──────────────────────────────────────────────────────────
tool_groups:
  - name: web
  - name: file:read
  - name: file:write
  - name: bash

tools:
  - name: web_search
    group: web
    use: deerflow.community.ddg_search.tools:web_search_tool
    max_results: 5

  - name: web_fetch
    group: web
    use: deerflow.community.jina_ai.tools:web_fetch_tool
    timeout: 10

  - name: ls
    group: file:read
    use: deerflow.sandbox.tools:ls_tool

  - name: read_file
    group: file:read
    use: deerflow.sandbox.tools:read_file_tool

  - name: write_file
    group: file:write
    use: deerflow.sandbox.tools:write_file_tool

  - name: str_replace
    group: file:write
    use: deerflow.sandbox.tools:str_replace_tool

  - name: bash
    group: bash
    use: deerflow.sandbox.tools:bash_tool

tool_search:
  enabled: false

# ── Sandbox ────────────────────────────────────────────────────────
# Local sandbox: runs directly on host, inherits VPN for Redshift access
sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider

# ── Skills ─────────────────────────────────────────────────────────
skills:
  container_path: /mnt/skills

# ── Subagents ──────────────────────────────────────────────────────
subagents:
  timeout_seconds: 900

# ── Title ──────────────────────────────────────────────────────────
title:
  enabled: true
  max_words: 6
  max_chars: 60
  model_name: null

# ── Summarization ──────────────────────────────────────────────────
# DISABLED — Each Slack thread is its own focused conversation with
# full context preserved in SQLite checkpoints. Claude's 200K context
# window is large enough for even heavy threads. Cross-thread knowledge
# is handled by the memory system (memory.json), not summarization.
#
# Previously at 15K tokens this was destroying thread context and
# replacing it with "Previous conversation was too long to summarize."
summarization:
  enabled: false

# ── Memory ─────────────────────────────────────────────────────────
memory:
  enabled: true
  storage_path: memory.json
  debounce_seconds: 30
  model_name: null
  max_facts: 100
  fact_confidence_threshold: 0.7
  injection_enabled: true
  max_injection_tokens: 2000

# ── Checkpointer ──────────────────────────────────────────────────
checkpointer:
  type: sqlite
  connection_string: checkpoints.db

# ── Slack Channel ──────────────────────────────────────────────────
channels:
  langgraph_url: http://localhost:2024
  gateway_url: http://localhost:8001

  session:
    assistant_id: lead_agent
    config:
      recursion_limit: 500
    context:
      thinking_enabled: true
      is_plan_mode: false
      subagent_enabled: false

  slack:
    enabled: true
    bot_token: $SLACK_BOT_TOKEN
    app_token: $SLACK_APP_TOKEN
    allowed_users: []
